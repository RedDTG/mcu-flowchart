changelog:
  exclude:
    authors:
      - dependabot
    labels:
      - skip-changelog
  categories:
    - title: Breaking Changes
      labels:
        - breaking
    - title: Major features
      labels:
        - major
    - title: Minor features
      labels:
        - feature
    - title: Bug Fixes
      labels:
        - bug
    - title: Documentation
      labels:
        - docs
    - title: Media content
      labels:
        - content
    - title: Other Changes
      labels:
        - chore
        - dependencies