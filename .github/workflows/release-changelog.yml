name: Build release changelog from main PRs

on:
  release:
    types: [published, edited]

permissions:
  contents: write
  pull-requests: read

jobs:
  update-release-notes:
    runs-on: ubuntu-latest

    steps:
      - name: Replace release notes with PRs merged into main
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const release = context.payload.release;

            const categories = [
              { title: 'Breaking Changes', labels: ['breaking'] },
              { title: 'Major features', labels: ['major'] },
              { title: 'Minor features', labels: ['feature'] },
              { title: 'Bug Fixes', labels: ['bug'] },
              { title: 'Documentation', labels: ['docs'] },
              { title: 'Media content', labels: ['content'] },
              { title: 'Other Changes', labels: ['chore', 'dependencies'] },
            ];

            const releases = await github.paginate(github.rest.repos.listReleases, {
              owner,
              repo,
              per_page: 100,
            });

            const currentPublishedAt = Date.parse(release.published_at || release.created_at);
            const previousRelease = releases
              .filter((candidate) => !candidate.draft)
              .filter((candidate) => candidate.id !== release.id)
              .filter((candidate) => Date.parse(candidate.published_at || candidate.created_at) < currentPublishedAt)
              .sort((left, right) => Date.parse(right.published_at || right.created_at) - Date.parse(left.published_at || left.created_at))[0];

            if (!previousRelease) {
              core.notice('No previous release found; keeping generated release notes unchanged.');
              return;
            }

            const commits = [];
            for (let page = 1; page < 100; page += 1) {
              const comparison = await github.rest.repos.compareCommitsWithBasehead({
                owner,
                repo,
                basehead: `${previousRelease.tag_name}...${release.tag_name}`,
                per_page: 100,
                page,
              });

              commits.push(...comparison.data.commits);

              if (comparison.data.commits.length < 100) {
                break;
              }
            }

            const pullRequestsByNumber = new Map();
            for (const commit of commits) {
              const pullRequests = await github.paginate(github.rest.repos.listPullRequestsAssociatedWithCommit, {
                owner,
                repo,
                commit_sha: commit.sha,
                per_page: 100,
              });

              for (const pullRequest of pullRequests) {
                const labels = pullRequest.labels.map((label) => label.name);
                const isMainFeaturePullRequest = pullRequest.base.ref === 'main' && pullRequest.head.ref !== 'stable';
                const isExcluded = pullRequest.user?.login === 'dependabot' || labels.includes('skip-changelog');

                if (pullRequest.merged_at && isMainFeaturePullRequest && !isExcluded) {
                  pullRequestsByNumber.set(pullRequest.number, pullRequest);
                }
              }
            }

            const pullRequests = [...pullRequestsByNumber.values()]
              .sort((left, right) => Date.parse(left.merged_at) - Date.parse(right.merged_at));

            if (pullRequests.length === 0) {
              core.notice('No merged PRs targeting main found in this release range; keeping generated release notes unchanged.');
              return;
            }

            const fallbackCategory = categories[categories.length - 1];
            const lines = [
              `## What's Changed`,
              '',
              `Changes included from PRs merged into \`main\` between \`${previousRelease.tag_name}\` and \`${release.tag_name}\`.`,
              '',
            ];

            for (const category of categories) {
              const matchingPullRequests = pullRequests.filter((pullRequest) => {
                const labels = pullRequest.labels.map((label) => label.name);
                const matchedCategory = categories.find((candidate) => candidate.labels.some((label) => labels.includes(label))) || fallbackCategory;
                return matchedCategory.title === category.title;
              });

              if (matchingPullRequests.length === 0) {
                continue;
              }

              lines.push(`### ${category.title}`, '');
              for (const pullRequest of matchingPullRequests) {
                lines.push(`- ${pullRequest.title} by @${pullRequest.user.login} in #${pullRequest.number}`);
              }
              lines.push('');
            }

            lines.push(`**Full Changelog**: https://github.com/${owner}/${repo}/compare/${previousRelease.tag_name}...${release.tag_name}`);

            await github.rest.repos.updateRelease({
              owner,
              repo,
              release_id: release.id,
              body: lines.join('\n'),
            });
