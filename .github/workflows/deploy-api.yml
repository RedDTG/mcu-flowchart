name: Deploy API with Docker Compose

on:
  push:
    branches: ["main"]
    paths:
      - "apps/api/**"
      - "dataset/**"
      - "docker-compose.server.yml"
      - "apps/api/Dockerfile"
      - ".github/workflows/deploy-api.yml"

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/mcu-flowchart-api:latest
            ghcr.io/${{ github.repository_owner }}/mcu-flowchart-api:${{ github.sha }}

  deploy:
    needs: build-and-push
    runs-on: [self-hosted, linux, x64]
    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy with Docker Compose on self-hosted runner
        env:
          API_IMAGE: ghcr.io/${{ github.repository_owner }}/mcu-flowchart-api:latest
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
        run: |
          set -e
          sudo mkdir -p /opt/mcu-flowchart-api
          sudo cp docker-compose.server.yml /opt/mcu-flowchart-api/docker-compose.server.yml
          cd /opt/mcu-flowchart-api
          echo "$GHCR_TOKEN" | docker login ghcr.io -u "${{ github.repository_owner }}" --password-stdin
          docker compose -f docker-compose.server.yml pull
          docker compose -f docker-compose.server.yml up -d
          docker image prune -f
